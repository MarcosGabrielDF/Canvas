<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Model Canvas Interativo</title>
    <style>
        :root {
            --border-color: #333;
            --bg-canvas: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        h1 { text-align: center; color: #2c3e50; }

        /* Grid Layout Padrão do Canvas */
        .canvas-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 400px) 200px;
            gap: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .block {
            background-color: white;
            border: 2px solid var/(--border-color);
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            border-radius: 4px;
            transition: background 0.3s;
        }

        /* Posicionamento Específico */
        .key-partners { grid-row: 1 / 3; grid-column: 1; }
        .key-activities { grid-row: 1; grid-column: 2; }
        .key-resources { grid-row: 2; grid-column: 2; }
        .value-propositions { grid-row: 1 / 3; grid-column: 3; }
        .customer-relationships { grid-row: 1; grid-column: 4; }
        .channels { grid-row: 2; grid-column: 4; }
        .customer-segments { grid-row: 1 / 3; grid-column: 5; }
        .cost-structure { grid-row: 3; grid-column: 1 / 3; }
        .revenue-streams { grid-row: 3; grid-column: 3 / 6; }

        h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Post-its */
        .note-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .note {
            background: #fff740;
            padding: 10px;
            width: 100%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            font-size: 0.85rem;
            position: relative;
            border-radius: 2px;
            animation: fadeIn 0.3s;
        }

        .note button {
            position: absolute;
            top: 2px;
            right: 2px;
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-weight: bold;
        }

        /* Controles */
        .controls {
            margin-top: auto;
            padding-top: 10px;
            display: flex;
            gap: 5px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 5px;
            border: 1px solid #ccc;
        }

        button.add-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        .color-picker {
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsividade para telas menores */
        @media (max-width: 1000px) {
            .canvas-container {
                display: flex;
                flex-direction: column;
                height: auto;
            }
            .block { height: 300px; }
        }
    </style>
</head>
<body>

    <h1>Business Model Canvas</h1>

    <div class="canvas-container" id="canvas">
        </div>

    <script>
        const sections = [
            { id: 'key-partners', title: 'Key Partners', class: 'key-partners' },
            { id: 'key-activities', title: 'Key Activities', class: 'key-activities' },
            { id: 'key-resources', title: 'Key Resources', class: 'key-resources' },
            { id: 'value-propositions', title: 'Value Propositions', class: 'value-propositions' },
            { id: 'customer-relationships', title: 'Customer Relationships', class: 'customer-relationships' },
            { id: 'channels', title: 'Channels', class: 'channels' },
            { id: 'customer-segments', title: 'Customer Segments', class: 'customer-segments' },
            { id: 'cost-structure', title: 'Cost Structure', class: 'cost-structure' },
            { id: 'revenue-streams', title: 'Revenue Streams', class: 'revenue-streams' }
        ];

        const canvasElement = document.getElementById('canvas');

        // Inicializar Blocos
        function init() {
            sections.forEach(sec => {
                const block = document.createElement('div');
                block.className = `block ${sec.class}`;
                block.id = sec.id;
                
                // Recuperar cor salva ou branco
                const savedColor = localStorage.getItem(`color-${sec.id}`) || '#ffffff';
                block.style.backgroundColor = savedColor;

                block.innerHTML = `
                    <h3>
                        ${sec.title}
                        <input type="color" class="color-picker" 
                               value="${savedColor}" 
                               onchange="changeColor('${sec.id}', this.value)">
                    </h3>
                    <div class="note-container" id="notes-${sec.id}"></div>
                    <div class="controls">
                        <input type="text" id="input-${sec.id}" placeholder="Nova nota...">
                        <button class="add-btn" onclick="addNote('${sec.id}')">+</button>
                    </div>
                `;
                canvasElement.appendChild(block);
                renderNotes(sec.id);
            });
        }

        // Mudar cor do quadro
        function changeColor(sectionId, color) {
            document.getElementById(sectionId).style.backgroundColor = color;
            localStorage.setItem(`color-${sectionId}`, color);
        }

        // Adicionar Nota
        function addNote(sectionId) {
            const input = document.getElementById(`input-${sectionId}`);
            const text = input.value.trim();
            if (text === "") return;

            const notes = JSON.parse(localStorage.getItem(`notes-${sectionId}`) || "[]");
            notes.push({ id: Date.now(), text: text });
            localStorage.setItem(`notes-${sectionId}`, JSON.stringify(notes));
            
            input.value = "";
            renderNotes(sectionId);
        }

        // Renderizar Notas
        function renderNotes(sectionId) {
            const container = document.getElementById(`notes-${sectionId}`);
            const notes = JSON.parse(localStorage.getItem(`notes-${sectionId}`) || "[]");
            
            container.innerHTML = notes.map(note => `
                <div class="note">
                    ${note.text}
                    <button onclick="deleteNote('${sectionId}', ${note.id})">×</button>
                </div>
            `).join('');
        }

        // Deletar Nota
        function deleteNote(sectionId, noteId) {
            let notes = JSON.parse(localStorage.getItem(`notes-${sectionId}`) || "[]");
            notes = notes.filter(n => n.id !== noteId);
            localStorage.setItem(`notes-${sectionId}`, JSON.stringify(notes));
            renderNotes(sectionId);
        }

        init();
    </script>
</body>
</html>
